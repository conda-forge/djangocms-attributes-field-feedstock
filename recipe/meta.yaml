{% set name = "djangocms-attributes-field" %}
{% set version = "4.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/djangocms_attributes_field-{{ version }}.tar.gz
  sha256: bc5f92abd2c567a5f9b25374729f545984a9c6643905f77f3f8c823805d5c5c4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - django-cms >=3.7

test:
  imports:
    - djangocms_attributes_field
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/django-cms/djangocms-attributes-field/
  summary: Adds attributes to Django models.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
